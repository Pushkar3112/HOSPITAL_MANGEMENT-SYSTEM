version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hms_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/hms_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - FRONTEND_URL=http://localhost
      - JWT_SECRET=random_jwt_secret_for_local_dev
      - JWT_REFRESH_SECRET=random_jwt_refresh_secret_for_local_dev
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    environment:
      - REACT_APP_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: hms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
