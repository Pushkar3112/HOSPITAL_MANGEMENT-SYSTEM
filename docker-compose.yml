version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: hms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hms_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/hms_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=super_secret_jwt_key_hms_2024
      - JWT_REFRESH_SECRET=super_secret_refresh_key_hms_2024
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:5000/api/auth/google/callback
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RAG_SERVICE_URL=http://rag_service:8000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "3000:3000"

  rag_service:
    build:
      context: ./rag_service
      dockerfile: Dockerfile
    container_name: hms-rag
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
